name: Build K40 Kernel (SukiSU Ultra)

on:
  workflow_dispatch:
    inputs:
      ksu:
        description: '添加 SukiSU Ultra 支持'
        required: false
        default: 'true'
      susfs:
        description: '添加 susfs 支持（4.19 non-GKI）'
        required: false
        default: 'true'
      kpm:
        description: '启用 KPM（4.19 non-GKI 默认关闭，开启可能需要额外兼容补丁）'
        required: false
        default: 'false'
      config_path:
        description: '内核配置文件路径（如果不需要KSU则忽略）/一般默认即可'
        required: false
        type: string
        default: 'arch/arm64/configs/'
      kernel_tag:
        description: '内核代码分支/Tag'
        required: false
        type: string
        default: 'master'
      config_name:
        description: '内核编译配置文件名'
        required: false
        type: string
        default: 'alioth_hylab_defconfig'
      git_url:
        description: '内核仓库地址'
        required: false
        type: string
        default: 'https://github.com/zfdx123/kernel_xiaomi_alioth.git'
      clang_url:
        description: '编译器下载地址'
        required: false
        type: string
        default: 'https://github.com/XSans0/WeebX-Clang/releases/download/WeebX-Clang-19.1.5-release/WeebX-Clang-19.1.5.tar.gz'
      susfs_repo:
        description: 'susfs4ksu 仓库地址'
        required: false
        type: string
        default: 'https://gitlab.com/simonpunk/susfs4ksu.git'
      susfs_ref:
        description: 'susfs4ksu 分支/Tag（4.19 用 kernel-4.19）'
        required: false
        type: string
        default: 'kernel-4.19'
      susfs_merged_patch_url:
        description: '可选：已手工合并好的 SukiSU Ultra + susfs 补丁 URL'
        required: false
        type: string
        default: ''

jobs:

  build_kernel:

    name: Build K40 Kernel (SukiSU Ultra)

    runs-on: ubuntu-22.04

    steps:

      - name: Checkout
        uses: actions/checkout@main
        with:
          ref: master
          fetch-depth: 0

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -qq update
          # sudo -E apt-get -qq install build-essential asciidoc binutils bzip2 gawk gettext git libncurses5-dev libz-dev patch python3 python2.7 unzip zlib1g-dev lib32gcc1-s1 libc6-dev-i386 subversion flex uglifyjs git-core gcc-multilib p7zip p7zip-full msmtp libssl-dev texinfo libglib2.0-dev xmlto qemu-utils upx libelf-dev autoconf automake libtool autopoint device-tree-compiler g++-multilib antlr3 gperf wget curl swig rsync
          sudo -E apt-get -qq install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev liblz4-tool libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev libc6-dev-i386 libncurses6 libncursesw6 lib32ncurses-dev lib32ncurses6 lib32ncursesw6 libncurses5-dev x11proto-core-dev libx11-dev libgl1-mesa-dev unzip fontconfig make python2
          sudo -E apt-get -qq install libfuse-dev
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone Asia/Shanghai

      - name: Init Config
        id: init_config
        run: |
          processed_name="$(basename "${{ inputs.config_name }}")"
          echo "processed_name=${processed_name}" >> $GITHUB_OUTPUT
          if [ "${{ github.event.inputs.ksu }}" = "true" ]; then
            if [ "${{ github.event.inputs.susfs }}" = "true" ]; then
              if [ "${{ github.event.inputs.kpm }}" = "true" ]; then
                echo "artifact_name=${processed_name} SukiSU-Ultra susfs KPM" >> $GITHUB_OUTPUT
              else
                echo "artifact_name=${processed_name} SukiSU-Ultra susfs" >> $GITHUB_OUTPUT
              fi
            else
              if [ "${{ github.event.inputs.kpm }}" = "true" ]; then
                echo "artifact_name=${processed_name} SukiSU-Ultra KPM" >> $GITHUB_OUTPUT
              else
                echo "artifact_name=${processed_name} SukiSU-Ultra" >> $GITHUB_OUTPUT
              fi
            fi
          else
            echo "artifact_name=${processed_name} Kernel" >> $GITHUB_OUTPUT
          fi

      - name: Install Clang
        run: |
          mkdir clang
          wget ${{ inputs.clang_url }}
          tar -C clang/ -zxvf *.tar.gz
      
      - name: Clone Kernel
        run: |
          git clone --depth=1 -b ${{ inputs.kernel_tag }} ${{ inputs.git_url }} kernel-source
          
      - name: Support SukiSU Ultra
        if: github.event.inputs.ksu == 'true'
        run: |
          cd kernel-source
          config_dir="${{ inputs.config_path }}"
          config_dir="${config_dir%/}"
          config_file="${config_dir}/${{ steps.init_config.outputs.processed_name }}"
          if [ ! -f "${config_file}" ]; then
            echo "Config file not found: ${config_file}"
            exit 1
          fi
          config_opts=(
            CONFIG_KPROBES
            CONFIG_KPROBE_EVENTS
            CONFIG_KALLSYMS
            CONFIG_KALLSYMS_ALL
          )
          if [ "${{ github.event.inputs.kpm }}" = "true" ]; then
            config_opts+=(
              CONFIG_KPM
            )
          fi
          if [ "${{ github.event.inputs.susfs }}" = "true" ]; then
            config_opts+=(
              CONFIG_KSU_SUSFS
              CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT
            )
          fi
          for opt in "${config_opts[@]}"; do
            sed -i "/^${opt}=.*/d;/^# ${opt} is not set/d" "${config_file}"
          done
          cat <<'EOF' >> "${config_file}"
          CONFIG_KPROBES=y
          CONFIG_KPROBE_EVENTS=y
          CONFIG_KALLSYMS=y
          CONFIG_KALLSYMS_ALL=y
          EOF
          if [ "${{ github.event.inputs.kpm }}" = "true" ]; then
            printf '%s\n' \
              'CONFIG_KPM=y' >> "${config_file}"
          fi
          if [ "${{ github.event.inputs.susfs }}" = "true" ]; then
            printf '%s\n' \
              'CONFIG_KSU_SUSFS=y' \
              'CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y' >> "${config_file}"
          fi
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s builtin

      - name: Integrate susfs4ksu
        if: github.event.inputs.ksu == 'true' && github.event.inputs.susfs == 'true'
        run: |
          git clone --depth=1 -b "${{ inputs.susfs_ref }}" "${{ inputs.susfs_repo }}" susfs4ksu
          cd kernel-source
          susfs_patch="../susfs4ksu/kernel_patches/50_add_susfs_in_kernel-4.19.patch"
          if [ ! -f "${susfs_patch}" ]; then
            echo "susfs patch not found: ${susfs_patch}"
            exit 1
          fi
          cp -f ../susfs4ksu/kernel_patches/fs/* fs/
          cp -f ../susfs4ksu/kernel_patches/include/linux/* include/linux/
          cp -f "${susfs_patch}" ./
          patch -p1 -F 3 --forward < 50_add_susfs_in_kernel-4.19.patch
          if [ -n "${{ inputs.susfs_merged_patch_url }}" ]; then
            curl -L "${{ inputs.susfs_merged_patch_url }}" -o sukisu-susfs-merged.patch
            patch -p1 -F 3 --forward < sukisu-susfs-merged.patch
          else
            echo "No merged SukiSU/susfs patch URL provided."
            echo "Upstream 10_enable_susfs_for_ksu.patch targets official KernelSU and does not apply cleanly to current SukiSU Ultra builtin."
          fi

      - name: Make
        run: |
          export ClangHome=$(pwd)/clang
          export PATH=${ClangHome}/bin:${PATH}
          cd kernel-source
          make LLVM=1 LLVM_IAS=1 O=out ARCH=arm64 SUBARCH=arm64 CC=clang LD=ld.lld ${{ steps.init_config.outputs.processed_name }}
          make LLVM=1 LLVM_IAS=1 O=out ARCH=arm64 SUBARCH=arm64 CC=clang LD=ld.lld olddefconfig
          set -o pipefail
          make -j$(nproc) LLVM=1 LLVM_IAS=1 O=out ARCH=arm64 SUBARCH=arm64 CC=clang LD=ld.lld CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- KBUILD_BUILD_USER=hylab KBUILD_BUILD_HOST=localhost 2>&1 | tee ../build.log
          build_status=${PIPESTATUS[0]}
          if [ ${build_status} -ne 0 ]; then
            echo "::group::Retry build with -j1"
            make -j1 LLVM=1 LLVM_IAS=1 O=out ARCH=arm64 SUBARCH=arm64 CC=clang LD=ld.lld CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- KBUILD_BUILD_USER=hylab KBUILD_BUILD_HOST=localhost 2>&1 | tee ../build-serial.log || true
            echo "::endgroup::"
            echo "::group::Build error summary"
            grep -nE "error:|fatal error:|undefined reference|No rule to make target" ../build-serial.log ../build.log | head -n 200 || true
            echo "::endgroup::"
            exit ${build_status}
          fi

      - name: Patch Boot
        run: |
          chmod +x ./magiskboot
          unzip boot.zip
          cp -rf kernel-source/out/arch/arm64/boot/* .
          ./magiskboot unpack boot.img
          rm -rf kernel
          cp -rf kernel-source/out/arch/arm64/boot/Image ./kernel
          ./magiskboot repack boot.img
          rm -rf ramdisk.cpio boot.img

      - name: Zip
        run:
          zip -r -9 -o Kernel.zip Image.gz-dtb Image.gz kernel new-boot.img kona.dtb kona-v2.dtb kona-v2.1.dtb

      - name: Kernel REL
        uses: actions/upload-artifact@main
        with:
          name: ${{ steps.init_config.outputs.artifact_name }}
          path: ./Kernel.zip

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@main
        with:
          name: ${{ steps.init_config.outputs.processed_name }} build-log
          path: |
            ./build.log
            ./build-serial.log
          if-no-files-found: ignore
